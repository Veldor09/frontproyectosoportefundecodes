# =============================================================
#  Fundecodes Digital — Reverse proxy
#  Dominios:
#    · tu-dominio.com      -> frontend Next.js (puerto 3000)
#    · api.tu-dominio.com  -> backend NestJS   (puerto 4000)
#
#  Reemplaza "tu-dominio.com" por tu dominio real antes de usar.
# =============================================================

# ---- Security headers comunes ----
map $sent_http_content_type $csp_header {
  default "default-src 'self'; img-src 'self' data: https:; media-src 'self' https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https:;";
}

# ============================================================
#  HTTP → HTTPS (ambos dominios) + webroot certbot
# ============================================================
server {
  listen 80;
  listen [::]:80;
  server_name tu-dominio.com www.tu-dominio.com api.tu-dominio.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ============================================================
#  FRONTEND (Next.js)
# ============================================================
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name tu-dominio.com www.tu-dominio.com;

  ssl_certificate     /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;

  # HSTS (2 años) — actívalo cuando confirmes que HTTPS funciona en todos lados.
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Redirige www → apex (opcional; comenta si quieres mantener ambos)
  if ($host = www.tu-dominio.com) {
    return 301 https://tu-dominio.com$request_uri;
  }

  # Proxy al contenedor del frontend
  location / {
    proxy_pass         http://frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }

  # Cache agresivo para estáticos de Next
  location /_next/static/ {
    proxy_pass http://frontend:3000;
    proxy_cache_valid 200 302 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
}

# ============================================================
#  BACKEND (NestJS)
# ============================================================
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name api.tu-dominio.com;

  ssl_certificate     /etc/letsencrypt/live/api.tu-dominio.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.tu-dominio.com/privkey.pem;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Tamaño subidas (coincide con FILE_MAX_SIZE_MB del backend)
  client_max_body_size 50m;

  # Rate limiting en login (mitiga brute-force)
  location /api/auth/login {
    limit_req zone=api_login burst=10 nodelay;
    proxy_pass         http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }

  # Healthcheck (sin rate limit para que monitores no triggereen)
  location = /healthz {
    proxy_pass http://backend:4000/healthz;
    access_log off;
  }

  # Servir uploads directamente desde disco (más eficiente que NestJS)
  location /uploads/ {
    alias /var/www/uploads/;
    # Solo lectura — subidas van vía POST a /api/files
    limit_except GET HEAD { deny all; }
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    # Evita ejecución si alguien sube algo raro
    add_header X-Content-Type-Options "nosniff" always;
  }

  # Resto de API
  location / {
    limit_req zone=api_general burst=50 nodelay;
    proxy_pass         http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    proxy_send_timeout 60s;
  }
}
